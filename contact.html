          <!-- Your Role -->

              <div class="ct-role-group" id="roleGroup">

                  ></i>
                  Administrator / Librarian</label

                <label class="ct-role-pill"

          <!-- Question -->
          <div class="ct-section">
            <div class="ct-section-hdr">

              <span class="ct-section-title">Your Question</span>
            </div>
            <div class="ct-section-body">
              <div style="display: flex; flex-direction: column; gap: 14px">
                <div class="ct-field">
                  <label class="ct-label" for="subject">Subject</label>
                  <input
                    class="ct-input"
                    type="text"
                    id="subject"
                    placeholder="Enter the subject of your question"
                  />
                </div>

                <div class="ct-field">
                  <label class="ct-label" for="question">Your question</label>
                  <textarea
                    class="ct-textarea"
                    id="question"
                    placeholder="Describe your question in detail..."
                  ></textarea>
                </div>

                <div class="ct-field">
                  <label class="ct-label"
                    >Attachment
                    <span class="ct-optional"
                      >(optional · max 20 MB)</span
                    ></label
                  >
                  <div
                    class="ct-file-area"
                    onclick="document.getElementById('fileInput').click()"
                  >
                    <i class="ti ti-cloud-upload" aria-hidden="true"></i>
                    <span
                      ><strong>Click to upload</strong> or drag and drop a file
                      here</span
                    >
                    <span
                      style="
                        display: block;
                        margin-top: 4px;
                        font-size: 11px;
                        color: #c0c8d0;
                      "
                      >Max file size: 20 MB</span
                    >
                  </div>
                  <input
                    class="ct-file-input"
                    type="file"
                    id="fileInput"
                    onchange="showFileName(this)"
                  />
                  <div
                    id="fileNameDisplay"
                    style="
                      font-size: 12px;
                      color: #0a1e3d;
                      margin-top: 4px;
                      display: none;
                    "
                  ></div>
                </div>
              </div>
            </div>
          </div>

    <!-- ============ FOOTER ============ -->
    <div id="footer"></div>

    <script>
      function showFileName(input) {
        const display = document.getElementById("fileNameDisplay");
        if (input.files && input.files[0]) {
          display.textContent = "📎 " + input.files[0].name;
          display.style.display = "block";
        }
      }

      async function include(id, file) {
        const response = await fetch(file);
        document.getElementById(id).innerHTML = await response.text();
      }

      include("topbar", "/jsm-demo/layout/new-topbar.html");
      include("nav", "/jsm-demo/layout/new-nav.html");
      include("indexing", "/jsm-demo/layout/new-indexing.html");
      include("footer", "/jsm-demo/layout/new-footer.html");
