          <div class="rg-section">
            <div class="rg-section-body">
              <div class="rg-grid">
                <div class="rg-field full">
                  <label class="rg-label" for="email">
                    Enter your account email address below and an email will be
                    sent with instructions on how to reset your password.
                  </label>

          <!-- Forgot Password -->

                  <h3 class="rg-label" for="email">Registered user's email</h3>

                    type="email"
                    id="email"

              </div>

          </div>

              <i class="ti ti-lock"></i> Reset password

              onclick="window.location.href = '/register.html'"

        </div>

    <div id="cta"></div>

    <div id="footer"></div>

    <script>
      function togglePw(id, icon) {
        const input = document.getElementById(id);
        if (input.type === "password") {
          input.type = "text";
          icon.classList.replace("ti-eye", "ti-eye-off");
        } else {
          input.type = "password";
          icon.classList.replace("ti-eye-off", "ti-eye");
        }
      }
      async function include(id, file) {
        const response = await fetch(file);
        document.getElementById(id).innerHTML = await response.text();
      }
      include("topbar", "/topbar.html");
      include("header", "/header.html");
      include("nav", "/nav.html");
      include("banner", "/banner.html");
      include("cta", "/cta.html");
      include("footer", "/footer.html");
    </script>
