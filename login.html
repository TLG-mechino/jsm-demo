  <body>
    <div id="topbar"></div>

    <div id="header"></div>

    <!-- NAV -->
    <div class="nav">
      <div class="inner">
        <div class="nav-home"><i class="ti ti-home"></i></div>
        <a href="/jsm-demo/home.html">INTRODUCTIONS</a>
        <a href="/jsm-demo/publication-ethics.html">PUBLICATIONS ETHICS</a>
        <a href="/jsm-demo/editorial-board.html">EDITORIAL BOARD</a>
        <div class="dropdown">

          <div class="dropdown-content">
            <a href="/jsm-demo/issue.html">Current</a>
            <a href="/jsm-demo/archives.html">Archives</a>
          </div>
        </div>
        <a href="/jsm-demo/policies.html">POLICIES</a>
        <div class="dropdown">
          <a href="#">GUIDELINES ▾</a>
          <div class="dropdown-content">
            <a href="/jsm-demo/guidelines/for-authors.html">For Authors</a>
            <a href="/jsm-demo/guidelines/for-reviewers.html">For Reviewers</a>
            <a href="/jsm-demo/guidelines/for-editors.html">For Editors</a>
          </div>
        </div>
        <a href="/jsm-demo/submission.html" class="active">SUBMISSION</a>
        <a href="/jsm-demo/notification.html">NOTIFICATION</a>
      </div>
    </div>

    <div id="banner"></div>

    <!-- CONTENT -->
    <div class="body-content">
      <div class="body-content-main">
        <div class="rg-wrap">
          <div class="rg-header">
            <i class="ti ti-lock" aria-hidden="true"></i>
            <p class="rg-header-title">Login</p>
          </div>

          <!-- Login -->
          <div class="rg-section">
            <div class="rg-section-body">
              <div class="rg-grid">
                <div class="rg-field full">
                  <label class="rg-label" for="username">
                    Username
                  </label>
                  <input
                    class="rg-input"
                    type="username"
                    id="username"
                    placeholder="Username"
                  />
                </div>

                <div class="rg-field full">
                  <label class="rg-label" for="password">
                    Password
                  </label>
                  <input
                    class="rg-input"
                    type="password"
                    id="password"
                    placeholder="Choose a password"
                  />
                </div>

              </div>
            </div>
          </div>

          <!-- Preferences -->
          <div class="rg-section">
            <div class="rg-section-body">
              <label class="rg-reviewer-text" for="reviewer">
                <a href="/jsm-demo/forgot-password.html">Forgot your password?</a>
              </label>
              <div class="rg-checks">
                <div class="rg-check-item">
                  <input class="rg-checkbox" type="checkbox" id="notify" />
                  <label class="rg-check-label" for="notify">
                    Keep me logged in
                  </label>
                </div>
              </div>

              <div class="rg-submit-row">
                <button class="rg-submit-btn">
                  <i class="ti ti-user-check"></i> Login
                </button>
                <button class="rg-register-btn" onclick="window.location.href='/jsm-demo/register.html'">
                  <i class="ti ti-user-plus"></i> Register
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
      <!-- SIDEBAR PHẢI -->
      <div class="cover-sidebar">
        <div class="cover-sidebar-hdr">
          <span class="cover-sidebar-title">JOURNAL OF STATE MANAGEMENT</span>
        </div>
        <div class="cover-item">
          <div class="cover-img">
            <img src="/jsm-demo/image/cover-jsm.png" alt="banner" />
          </div>
        </div>
        <div class="cover-sidebar-hdr">
          <span class="cover-sidebar-title">ABSTRACTING & INDEXING</span>
        </div>
        <div class="cover-item">
          <div class="cover-img">
            <img
              src="/jsm-demo/image/scopus-logo-png-seeklogo-335404.png"
              alt="banner"
            />
          </div>
        </div>
        <div class="cover-item">
          <div class="cover-img">
            <img
              src="/jsm-demo/image/banner-ref-jstt-1-f3b62e086889abf6d4d60c3fb71d79fa.jpg"
              alt="banner"
            />
          </div>
        </div>
        <div class="cover-item">
          <div class="cover-img">
            <img src="/jsm-demo/image/crossref-logo-landscape-200.png" alt="banner" />
          </div>
        </div>
        <div class="cover-item">
          <div class="cover-img">
            <img src="/jsm-demo/image/google.png" alt="banner" />
          </div>
        </div>
      </div>
    </div>

    <div id="cta"></div>

    <div id="footer"></div>

    <script>
      function togglePw(id, icon) {
        const input = document.getElementById(id);
        if (input.type === "password") {
          input.type = "text";
          icon.classList.replace("ti-eye", "ti-eye-off");
        } else {
          input.type = "password";
          icon.classList.replace("ti-eye-off", "ti-eye");
        }
      }
      async function include(id, file) {
        const response = await fetch(file);
        document.getElementById(id).innerHTML = await response.text();
      }
      include("topbar", "/jsm-demo/topbar.html");
      include("header", "/jsm-demo/header.html");
      include("nav", "/jsm-demo/nav.html");
      include("banner", "/jsm-demo/banner.html");
      include("cta", "/jsm-demo/cta.html");
      include("footer", "/jsm-demo/footer.html");
    </script>
  </body>
</html>
